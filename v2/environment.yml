name: rag_document_generator
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy>=1.26
  - pip:
      # Core API & web
      - fastapi>=0.115.0
      - uvicorn[standard]>=0.30.0
      - streamlit>=1.36.0
      - httpx>=0.27.0
      - python-multipart>=0.0.9
      - pydantic>=2.8.0
      - pydantic-settings>=2.4.0
      - aiofiles>=23.0.0
      - python-dotenv>=1.0.0
      - watchdog>=4.0.0
      # Document processing
      - python-docx>=1.1.2
      - pypdf>=4.3.0
      - reportlab>=4.0.0
      - pymupdf>=1.23.0
      - pdfplumber>=0.10.0
      - beautifulsoup4>=4.12.0
      - markdown>=3.5.0
      - openpyxl>=3.1.0
      - pandas>=2.1.0
      - tabulate>=0.9.0
      # OCR
      - pytesseract>=0.3.10
      # ML / embeddings (optional but enables image captioning)
      - transformers>=4.40.0
      - accelerate>=0.27.0
      - huggingface-hub>=0.22.0
      # NOTE: torch must be installed separately with the correct CUDA variant:
      # conda run -n rag_document_generator pip install torch --index-url https://download.pytorch.org/whl/cpu
      # Async task queue
      - celery>=5.4.0
      - redis>=5.0.0
      # Vector / database
      - qdrant-client>=1.10.0
      - psycopg[binary]>=3.2.0
      # CLI
      - click>=8.0.0
      # Testing
      - pytest>=8.2.0
      - pytest-asyncio>=0.23.0
      - pytest-cov>=4.0.0
