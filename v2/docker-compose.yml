services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag_platform
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/storage/postgres/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      APP_STORAGE_DIR: /app/storage
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: rag_platform
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag_password
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploaded_docs:/app/storage/projects
      - generated_docs:/app/storage/generated_docs
      - logs:/app/storage/logs
      - ./storage:/app/storage/cache_host
    depends_on:
      - ollama
      - postgres
      - qdrant
      - redis

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://fastapi:8000
    volumes:
      - uploaded_docs:/app/storage/projects
      - generated_docs:/app/storage/generated_docs
      - logs:/app/storage/logs
    depends_on:
      - fastapi

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: celery -A workers.celery_app worker --loglevel=INFO
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      APP_STORAGE_DIR: /app/storage
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: rag_platform
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag_password
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploaded_docs:/app/storage/projects
      - generated_docs:/app/storage/generated_docs
      - logs:/app/storage/logs
    depends_on:
      - fastapi
      - redis
      - postgres
      - qdrant

volumes:
  postgres_data:
  qdrant_storage:
  ollama_models:
  uploaded_docs:
  generated_docs:
  logs:
  redis_data:
